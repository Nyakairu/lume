name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build darwin/arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o lume-darwin-arm64 ./cmd/lume/...

      - name: Build darwin/amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o lume-darwin-amd64 ./cmd/lume/...

      - name: Generate checksums
        run: shasum -a 256 lume-darwin-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lume-darwin-arm64
            lume-darwin-amd64
            checksums.txt

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256_ARM64=$(shasum -a 256 lume-darwin-arm64 | awk '{print $1}')
          SHA256_AMD64=$(shasum -a 256 lume-darwin-amd64 | awk '{print $1}')

          # Update the formula in this repo
          sed -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
              -e "s/SHA256_ARM64_PLACEHOLDER/${SHA256_ARM64}/g" \
              -e "s/SHA256_AMD64_PLACEHOLDER/${SHA256_AMD64}/g" \
              Formula/lume.rb > /tmp/lume.rb

          # If HOMEBREW_TAP_TOKEN is set, push to the tap repo
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Tyooughtul/homebrew-tap.git" /tmp/homebrew-tap
            mkdir -p /tmp/homebrew-tap/Formula
            cp /tmp/lume.rb /tmp/homebrew-tap/Formula/lume.rb
            cd /tmp/homebrew-tap
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Formula/lume.rb
            git commit -m "lume ${VERSION}" || true
            git push
          fi
